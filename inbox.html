<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&display=swap" rel="stylesheet">
<title>Support inbox — Umair TikTok Wala</title>
<style>
  :root{
    --bg:#F6F7FB; --panel:#FFFFFF; --panel2:#F9FAFC; --line:#ECEEF4;
    --text:#0F1222; --dim:#5B6178; --faint:#8A90A6;
    --brand1:#2563eb; --brand2:#7c3aed; --brand3:#dc2626;
    --in:#F1F3F8; --out:#E3EDFD;
    --ok:#16a34a; --warn:#b45309; --danger:#dc2626;
    --radius:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Bricolage Grotesque",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); height:100vh; overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer}
  input,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#D6DAE5;border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---------- Login ---------- */
  #login{height:100vh;display:flex;align-items:center;justify-content:center}
  .login-card{
    width:340px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(15,18,34,.06);
  }
  .logo{
    height:4px;width:56px;border-radius:2px;margin-bottom:22px;
    background:linear-gradient(90deg,var(--brand1),var(--brand2),var(--brand3));
  }
  .login-card h1{font-size:19px;font-weight:600;margin-bottom:6px}
  .login-card p{font-size:13px;color:var(--dim);margin-bottom:22px}
  .field{
    width:100%;height:42px;background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius);color:var(--text);padding:0 13px;font-size:14px;margin-bottom:11px;
  }
  .field:focus{outline:none;border-color:var(--brand1)}
  .btn-primary{
    width:100%;height:42px;border:none;border-radius:var(--radius);color:#fff;
    font-size:14px;font-weight:600;
    background:linear-gradient(90deg,var(--brand1),var(--brand2));
  }
  .btn-primary:disabled{opacity:.55}
  .err{color:var(--danger);font-size:13px;margin-top:11px;min-height:18px}

  /* ---------- Shell ---------- */
  #app{display:none;height:100vh;flex-direction:column}
  .topbar{
    height:54px;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:11px}
  .brand-mark{
    width:9px;height:26px;border-radius:3px;
    background:linear-gradient(180deg,var(--brand1),var(--brand2),var(--brand3));
  }
  .brand b{font-size:14px;font-weight:600;display:block}
  .brand span{font-size:11px;color:var(--faint)}
  .topbar-right{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--dim)}
  .total-badge{
    background:var(--brand1);color:#fff;font-size:11px;font-weight:600;
    padding:3px 9px;border-radius:11px;
  }
  .icon-btn{
    background:none;border:1px solid var(--line);border-radius:7px;
    width:32px;height:32px;font-size:15px;color:var(--dim);
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{border-color:var(--brand1);color:var(--brand1)}
  .icon-btn.on{background:rgba(37,99,235,.1);border-color:var(--brand1);color:var(--brand1)}
  .link-btn{background:none;border:none;color:var(--dim);font-size:13px}
  .link-btn:hover{color:var(--text)}

  .main{flex:1;display:grid;grid-template-columns:300px 1fr 250px;overflow:hidden}
  @media(max-width:980px){.main{grid-template-columns:1fr}.col-list,.col-info{display:none}}

  /* ---------- Filters + list ---------- */
  .col-list{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .search-wrap{padding:11px 13px 8px}
  .search{
    width:100%;height:34px;background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;color:var(--text);padding:0 11px;font-size:13px;
  }
  .search:focus{outline:none;border-color:var(--brand1)}
  .filters{display:flex;gap:5px;padding:0 13px 10px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .filters button{
    font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--line);
    background:transparent;color:var(--dim);
  }
  .filters button.active{background:rgba(37,99,235,.1);border-color:var(--brand1);color:var(--brand1);font-weight:600}
  .filters-2{padding-top:0;padding-bottom:8px;border-bottom:none}
  .filters-2 button.active{background:rgba(22,163,74,.1);border-color:var(--ok);color:#15803d}
  .filters-3{padding-top:0;padding-bottom:10px;gap:6px}
  .mini-select{
    flex:1;font-size:11px;padding:5px 7px;border-radius:6px;
    border:1px solid var(--line);background:transparent;color:var(--dim);
  }
  .mini-select:focus{outline:none;border-color:var(--brand1)}
  .tag-fb{background:rgba(37,99,235,.12);color:#1d4ed8;font-weight:600}
  .tag-tt{background:rgba(15,18,34,.08);color:#0F1222;font-weight:600}
  .tag-batch{background:var(--panel2);color:var(--dim);border:1px solid var(--line)}
  .convo-list{flex:1;overflow-y:auto}
  .convo{
    padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;
    border-left:3px solid transparent;
  }
  .convo:hover{background:var(--panel2)}
  .convo.active{background:#EEF3FE;border-left-color:var(--brand1)}
  .convo.unread{background:#FBFCFF;border-left-color:var(--brand1)}
  .convo.unread.active{background:#EEF3FE}
  .convo.read{opacity:.72}
  .convo-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .convo-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .convo.unread .convo-name{font-weight:700}
  .convo-time{font-size:11px;color:var(--faint);flex-shrink:0}
  .convo-preview{font-size:12px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .convo.unread .convo-preview{color:var(--text);font-weight:500}
  .convo-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
  .tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
  .tag-unread{background:var(--brand1);color:#fff}
  .tag-paid{background:rgba(22,163,74,.12);color:#15803d}
  .tag-new{background:rgba(124,58,237,.12);color:#6d28d9}
  .tag-wait{background:rgba(180,83,9,.12);color:#b45309}
  .tag-wait.urgent{background:rgba(220,38,38,.12);color:#b91c1c;font-weight:600}
  .tag-expiring{background:rgba(180,83,9,.12);color:#b45309}
  .tag-agent{background:var(--panel2);color:var(--dim);border:1px solid var(--line)}
  .tag-free{background:rgba(139,144,166,.14);color:#5B6178}
  .tag-fb{background:rgba(24,119,242,.12);color:#1877F2;font-weight:600}
  .tag-tt{background:rgba(15,18,34,.08);color:#0F1222;font-weight:600}
  .tag-batch{background:rgba(124,58,237,.09);color:#6d28d9}
  .tag-viewing{background:rgba(22,163,74,.14);color:#15803d;font-weight:600}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
  .empty{padding:36px 20px;text-align:center;color:var(--faint);font-size:13px;line-height:1.6}

  /* ---------- Chat ---------- */
  .col-chat{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
  .chat-head{
    min-height:56px;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:9px 17px;flex-shrink:0;gap:10px;
  }
  .chat-head-name{font-size:14px;font-weight:600}
  .chat-head-sub{font-size:11px;color:var(--faint);margin-top:1px}
  .chat-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .mini-btn{
    font-size:11px;padding:5px 10px;border-radius:6px;
    border:1px solid var(--line);background:var(--panel);color:var(--dim);
  }
  .mini-btn:hover{border-color:var(--brand1);color:var(--brand1)}
  .mini-btn.primary{background:var(--brand1);border-color:var(--brand1);color:#fff;font-weight:600}
  .window-pill{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--panel2);color:var(--dim)}
  .window-pill.warn{background:rgba(180,83,9,.12);color:#b45309}
  .window-pill.closed{background:rgba(220,38,38,.1);color:#b91c1c}
  .viewing-bar{
    background:rgba(22,163,74,.08);color:#15803d;font-size:12px;
    padding:6px 17px;border-bottom:1px solid var(--line);
  }

  .messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:9px}
  .bubble{max-width:62%;padding:9px 13px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
  .bubble.in{align-self:flex-start;background:var(--in);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bubble.out{align-self:flex-end;background:var(--out);border-bottom-right-radius:4px}
  .bubble.pending{opacity:.62}
  .bubble.failed{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.3);opacity:1}
  .bubble.failed .meta{color:var(--danger)}
  .meta{font-size:10px;color:var(--faint);margin-top:5px;display:block}
  .agent-chip{font-weight:600}

  /* ---------- Composer ---------- */
  .composer{background:var(--panel);border-top:1px solid var(--line);padding:11px 16px;flex-shrink:0;position:relative}
  .quick{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap;align-items:center}
  .quick button{
    font-size:11px;padding:5px 11px;border-radius:6px;
    background:var(--panel2);border:1px solid var(--line);color:var(--dim);
  }
  .quick button:hover{color:var(--brand1);border-color:var(--brand1)}
  .quick .manage{border-style:dashed}
  .composer-row{display:flex;gap:9px;align-items:flex-end}
  .composer textarea{
    flex:1;min-height:40px;max-height:130px;background:var(--panel2);
    border:1px solid var(--line);border-radius:var(--radius);color:var(--text);
    padding:10px 13px;font-size:14px;resize:none;line-height:1.5;
  }
  .composer textarea:focus{outline:none;border-color:var(--brand1)}
  .send-btn{
    width:40px;height:40px;border:none;border-radius:var(--radius);color:#fff;font-size:17px;
    background:linear-gradient(135deg,var(--brand1),var(--brand2));flex-shrink:0;
  }
  .send-btn:disabled{opacity:.4}
  .send-err{color:var(--danger);font-size:12px;margin-top:7px;min-height:16px}
  .hint{font-size:11px;color:var(--faint);margin-top:6px}

  /* slash-command dropdown */
  .slash{
    position:absolute;bottom:100%;left:16px;right:16px;margin-bottom:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;
    box-shadow:0 -6px 24px rgba(15,18,34,.1);max-height:260px;overflow-y:auto;display:none;z-index:40;
  }
  .slash.show{display:block}
  .slash-item{padding:9px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .slash-item:last-child{border-bottom:none}
  .slash-item.sel,.slash-item:hover{background:#EEF3FE}
  .slash-cmd{font-size:12px;font-weight:600;color:var(--brand1)}
  .slash-body{font-size:12px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---------- Info panel ---------- */
  .col-info{background:var(--panel);border-left:1px solid var(--line);padding:18px 16px;overflow-y:auto}
  .info-title{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:13px}
  .avatar{
    width:52px;height:52px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:17px;font-weight:600;color:#fff;margin-bottom:11px;
    background:linear-gradient(135deg,var(--brand1),var(--brand2));
  }
  .info-name{font-size:15px;font-weight:600}
  .info-number{font-size:12px;color:var(--dim);margin-top:2px}
  .info-row{padding:10px 0;border-bottom:1px solid var(--line)}
  .info-label{font-size:11px;color:var(--faint)}
  .info-value{font-size:13px;margin-top:3px}
  .chip{display:inline-block;font-size:11px;padding:3px 9px;border-radius:5px;background:var(--panel2);color:var(--dim);margin:3px 4px 0 0;border:1px solid var(--line)}
  .placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:14px}

  /* ---------- Modal ---------- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(15,18,34,.4);z-index:100;
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--panel);border-radius:16px;width:100%;max-width:560px;
    max-height:82vh;display:flex;flex-direction:column;box-shadow:0 12px 48px rgba(15,18,34,.18);
  }
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-head h2{font-size:16px;font-weight:600}
  .modal-body{padding:18px 22px;overflow-y:auto;flex:1}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end}
  .sr-item{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px}
  .sr-item-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .sr-cmd{font-size:13px;font-weight:600;color:var(--brand1)}
  .sr-text{font-size:12px;color:var(--dim);margin-top:5px;white-space:pre-wrap;line-height:1.5}
  .sr-actions{display:flex;gap:6px}
  .tiny-btn{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--dim)}
  .tiny-btn:hover{color:var(--brand1);border-color:var(--brand1)}
  .tiny-btn.danger:hover{color:var(--danger);border-color:var(--danger)}
  .form-label{font-size:12px;color:var(--dim);margin:12px 0 5px;display:block}
  .modal input[type=text],.modal textarea{
    width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);padding:9px 12px;font-size:14px;
  }
  .modal textarea{min-height:100px;resize:vertical;line-height:1.5}
  .modal input:focus,.modal textarea:focus{outline:none;border-color:var(--brand1)}
  /* ---------- Labels ---------- */
  .lab{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;white-space:nowrap}
  .lab-blue{background:rgba(37,99,235,.12);color:#1d4ed8}
  .lab-green{background:rgba(22,163,74,.12);color:#15803d}
  .lab-amber{background:rgba(180,83,9,.12);color:#b45309}
  .lab-red{background:rgba(220,38,38,.1);color:#b91c1c}
  .lab-purple{background:rgba(124,58,237,.12);color:#6d28d9}
  .lab-grey{background:var(--panel2);color:var(--dim);border:1px solid var(--line)}
  .lab-pick{cursor:pointer;opacity:.45;border:1px solid var(--line)}
  .lab-pick.on{opacity:1;border-color:transparent}
  .label-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

  /* ---------- Notes ---------- */
  .note-box{margin-top:14px}
  .note{
    background:#FFFBEB;border:1px solid #FDE68A;border-radius:9px;
    padding:9px 11px;margin-bottom:8px;font-size:12px;line-height:1.5;
  }
  .note-meta{font-size:10px;color:#92400E;margin-top:5px;display:flex;justify-content:space-between;gap:8px}
  .note-del{background:none;border:none;color:#92400E;font-size:10px;cursor:pointer;text-decoration:underline}
  .note-input{
    width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);padding:8px 10px;font-size:12px;resize:vertical;min-height:56px;line-height:1.5;
  }
  .note-input:focus{outline:none;border-color:var(--brand1)}

  /* ---------- Stats ---------- */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin-bottom:20px}
  .stat-card{border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat-num{font-size:24px;font-weight:700;letter-spacing:-.02em}
  .stat-lbl{font-size:11px;color:var(--faint);margin-top:3px}
  .stat-table{width:100%;border-collapse:collapse;font-size:13px}
  .stat-table th{
    text-align:left;font-size:11px;color:var(--faint);font-weight:500;
    padding:8px 10px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.05em;
  }
  .stat-table td{padding:9px 10px;border-bottom:1px solid var(--line)}
  .stat-table tr:last-child td{border-bottom:none}
  .bar{height:6px;border-radius:3px;background:var(--brand1);display:inline-block;vertical-align:middle}
  .modal.wide{max-width:720px}
  .survey-yes{color:#15803d;font-weight:600}
  .survey-no{color:#b91c1c;font-weight:600}
  /* ---------- Media bubbles ---------- */
  .bubble.media{padding:5px;max-width:300px}
  .bubble.media img,.bubble.media video{
    width:100%;border-radius:9px;display:block;cursor:pointer;background:var(--panel2);
  }
  .bubble.media img{max-height:320px;object-fit:cover}
  .bubble.media .cap{padding:6px 8px 2px;font-size:14px;line-height:1.45;white-space:pre-wrap}
  .bubble.media .meta{padding:0 8px 4px}
  .media-load{
    padding:26px 20px;text-align:center;color:var(--faint);font-size:12px;
    background:var(--panel2);border-radius:9px;
  }
  .media-fail{
    padding:16px;text-align:center;color:var(--warn);font-size:12px;
    background:rgba(180,83,9,.07);border-radius:9px;line-height:1.5;
  }
  .doc-row{
    display:flex;align-items:center;gap:10px;padding:9px 11px;
    background:var(--panel2);border-radius:9px;text-decoration:none;color:var(--text);
  }
  .doc-row:hover{background:#EEF3FE}
  .doc-icon{font-size:20px;flex-shrink:0}
  .doc-name{font-size:13px;font-weight:500;word-break:break-word}
  .doc-sub{font-size:11px;color:var(--faint)}
  .aud{display:flex;align-items:center;gap:9px;padding:6px 4px}
  .aud audio{height:34px;max-width:230px}

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed;inset:0;background:rgba(15,18,34,.9);z-index:200;
    display:none;align-items:center;justify-content:center;padding:30px;
  }
  .lightbox.show{display:flex}
  .lightbox img,.lightbox video{max-width:100%;max-height:100%;border-radius:11px}
  .lightbox-close{
    position:absolute;top:18px;right:22px;background:rgba(255,255,255,.15);
    border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;
  }

  /* ---------- Message menu ---------- */
  .bubble{position:relative}
  .msg-menu{
    position:absolute;top:3px;right:5px;width:22px;height:22px;
    border:none;background:rgba(15,18,34,.06);border-radius:5px;
    font-size:13px;line-height:1;color:var(--dim);cursor:pointer;
    opacity:0;transition:opacity .15s;
  }
  .bubble:hover .msg-menu{opacity:1}
  .bubble.in .msg-menu{right:auto;left:5px}

  /* ---------- Undo bar ---------- */
  .undo-bar{
    display:none;align-items:center;justify-content:space-between;gap:10px;
    background:#0F1222;color:#fff;border-radius:9px;padding:9px 13px;
    font-size:13px;margin-bottom:9px;
  }
  .undo-bar.show{display:flex}
  .undo-bar button{
    background:none;border:none;color:#7dabff;font-size:13px;font-weight:600;cursor:pointer;
  }
  .undo-count{font-size:11px;color:#8A90A6}

  /* ---------- Attach ---------- */
  .attach-btn{
    width:40px;height:40px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel2);color:var(--dim);font-size:17px;flex-shrink:0;
  }
  .attach-btn:hover{border-color:var(--brand1);color:var(--brand1)}
  .file-preview{
    display:none;align-items:center;gap:10px;background:var(--panel2);
    border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin-bottom:9px;
  }
  .file-preview.show{display:flex}
  .file-preview img{width:42px;height:42px;object-fit:cover;border-radius:6px}
  .file-preview .fp-name{font-size:12px;font-weight:500;flex:1;word-break:break-all}
  .file-preview .fp-size{font-size:11px;color:var(--faint)}
  .drop-hint{
    position:absolute;inset:0;background:rgba(37,99,235,.08);

let me = { uid: null, name: "", email: "", role: "" };

const $ = (id) => document.getElementById(id);

  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")

// ---------- Login ----------
$("loginBtn").onclick = async () => {

// ---------- Preferences (sound / notifications) ----------
function loadPrefs() {
  soundOn = true;
  notifOn = ("Notification" in window) && Notification.permission === "granted";
  paintPrefButtons();
}
function paintPrefButtons() {
  $("soundBtn").classList.toggle("on", soundOn);
  $("notifBtn").classList.toggle("on", notifOn);
}
$("soundBtn").onclick = () => { soundOn = !soundOn; paintPrefButtons(); };
$("notifBtn").onclick = async () => {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") { notifOn = !notifOn; paintPrefButtons(); return; }
  const p = await Notification.requestPermission();
  notifOn = p === "granted";
  paintPrefButtons();
};

// Chhoti si beep — koi file ki zaroorat nahi
function beep() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.16, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.28);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
    setTimeout(() => ctx.close(), 600);
  } catch (e) {}
}
function notify(title, body) {
  if (!notifOn || document.hasFocus()) return;
  try { new Notification(title, { body, icon: "/img/logo.png" }); } catch (e) {}
}

// ---------- Team list (assign transfer ke liye) ----------
async function loadTeam() {
  try {
    const snap = await getDocs(collection(db, "admins"));
    team = snap.docs.map(d => ({ uid: d.id, name: d.data().name || d.id, role: d.data().role || "" }));
  } catch (e) { team = []; }
}

// ---------- Presence (kaun kaunsi chat khole baitha hai) ----------
function watchPresence() {
  if (unsubPresence) unsubPresence();
  unsubPresence = onSnapshot(collection(db, "presence"), (snap) => {
    presence = {};
    snap.forEach(d => {
      const p = d.data();
      if (!p || !p.convoId) return;
      const at = p.at?.toMillis ? p.at.toMillis() : 0;
      if (Date.now() - at > PRESENCE_STALE_SEC * 1000) return; // purani
      if (p.uid === me.uid) return;                            // apni nahi ginte
      presence[p.convoId] = { uid: p.uid, name: p.name || "Team", at };
    });
    renderList();
    if (activeId) paintViewingBar();
  });
}

async function setMyPresence(convoId) {
  if (!me.uid) return;
  try {
    await setDoc(doc(db, "presence", me.uid), {
      uid: me.uid, name: me.name, convoId: convoId || null, at: serverTimestamp()
    });
  } catch (e) {}
}
async function clearMyPresence() {
  if (!me.uid) return;
  try { await deleteDoc(doc(db, "presence", me.uid)); } catch (e) {}
}
document.addEventListener("click", () => {
  const am = document.getElementById("assignMenu");
  if (am) am.classList.remove("show");
});

window.addEventListener("beforeunload", () => {
  if (me.uid) navigator.sendBeacon ? clearMyPresence() : clearMyPresence();
});

function startPresenceLoop(convoId) {
  if (presenceTimer) clearInterval(presenceTimer);
  setMyPresence(convoId);
  presenceTimer = setInterval(() => setMyPresence(convoId), PRESENCE_REFRESH_SEC * 1000);
}

function paintViewingBar() {
  const bar = $("viewingBar");
  if (!bar) return;
  const p = presence[activeId];
  if (p) {
    bar.textContent = p.name + " is viewing this chat";
    bar.style.display = "block";
  } else {
    bar.style.display = "none";
  }
}

// ---------- Saved replies ----------
function watchSavedReplies() {
  onSnapshot(query(collection(db, "savedReplies"), orderBy("cmd")), (snap) => {
    savedReplies = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderSrList();
    if (activeId) renderQuickBar();
  });
}

$("srClose").onclick = closeSrModal;
$("srCancel").onclick = closeSrModal;
function openSrModal() { $("srModal").classList.add("show"); resetSrForm(); }
function closeSrModal() { $("srModal").classList.remove("show"); resetSrForm(); }
function resetSrForm() {
  editingSrId = null;
  $("srCmd").value = "";
  $("srText").value = "";
  $("srFormTitle").textContent = "Add new";
}

$("srSave").onclick = async () => {
  const cmd = $("srCmd").value.trim().toLowerCase().replace(/^\//, "").replace(/\s+/g, "");
  const text = $("srText").value.trim();
  if (!cmd || !text) return;
  try {
    if (editingSrId) {
      await updateDoc(doc(db, "savedReplies", editingSrId), { cmd, text, updatedBy: me.name });
    } else {
      await addDoc(collection(db, "savedReplies"), {
        cmd, text, createdBy: me.name, createdAt: serverTimestamp()
      });
    }
    resetSrForm();
  } catch (e) {
    alert("Save nahi hua: " + e.message);
  }
};

function renderSrList() {
  const box = $("srList");
  if (!box) return;
  if (!savedReplies.length) {
    box.innerHTML = '<div class="empty" style="padding:14px 0">Abhi koi saved reply nahi.<br>Neeche se add karein.</div>';
    return;
  }
  box.innerHTML = savedReplies.map(r =>
    '<div class="sr-item">' +
      '<div class="sr-item-top">' +
        '<span class="sr-cmd">/' + esc(r.cmd) + '</span>' +
        '<span class="sr-actions">' +
          '<button class="tiny-btn" data-edit="' + r.id + '">Edit</button>' +
          '<button class="tiny-btn danger" data-del="' + r.id + '">Delete</button>' +
        '</span>' +
      '</div>' +
      '<div class="sr-text">' + esc(r.text) + '</div>' +
    '</div>'
  ).join("");

  box.querySelectorAll("[data-edit]").forEach(b => {
    b.onclick = () => {
      const r = savedReplies.find(x => x.id === b.dataset.edit);
      if (!r) return;
      editingSrId = r.id;
      $("srCmd").value = r.cmd;
      $("srText").value = r.text;
      $("srFormTitle").textContent = "Edit /" + r.cmd;
      $("srCmd").focus();
    };
  });
  box.querySelectorAll("[data-del]").forEach(b => {
    b.onclick = async () => {
      if (!confirm("Ye saved reply delete kar dein?")) return;
      try { await deleteDoc(doc(db, "savedReplies", b.dataset.del)); } catch (e) {}
    };
  });
}

// ---------- Conversation list ----------
function watchConversations() {
  const q = query(collection(db, "conversations"), orderBy("lastMessageAt", "desc"), limit(40));
  onSnapshot(q, (snap) => {
    const next = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Naye messages ka pata lagana (notification ke liye)
    if (!firstLoad) {
      next.forEach(c => {
        const prev = convos.find(x => x.id === c.id);
        const prevAt = prev?.lastMessageAt?.toMillis ? prev.lastMessageAt.toMillis() : 0;
        const nowAt = c.lastMessageAt?.toMillis ? c.lastMessageAt.toMillis() : 0;
        const isNewIncoming = nowAt > prevAt && (c.unread || 0) > (prev?.unread || 0);
        if (isNewIncoming && c.id !== activeId) {
          beep();
          notify(displayNameOf(c), c.lastMessage || "New message");
        }
      });
    }
    firstLoad = false;

    convos = next;
    refreshBatchOptions();
    renderList();
    updateTotalBadge();
    if (activeId) { renderInfo(); paintChatHead(); }
  });
}

$("search").oninput = (e) => { searchTerm = e.target.value.toLowerCase(); renderList(); };

$("filters").querySelectorAll("button").forEach(b => {
  b.onclick = () => {
    currentFilter = b.dataset.f;
    $("filters").querySelectorAll("button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    renderList();
  };
});

function minsSince(ts) {
  if (!ts) return 0;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return Math.floor((Date.now() - d.getTime()) / 60000);
}
function timeAgo(ts) {
  const m = minsSince(ts);
  if (!ts) return "";
  if (m < 1) return "now";
  if (m < 60) return m + "m";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h";
  return Math.floor(h / 24) + "d";
}
function windowState(c) {
  if (!c.windowExpiresAt) return { label: "", cls: "" };
  const exp = c.windowExpiresAt.toDate ? c.windowExpiresAt.toDate() : new Date(c.windowExpiresAt);
  const mins = Math.floor((exp.getTime() - Date.now()) / 60000);
  if (mins <= 0) return { label: "Window closed", cls: "closed" };
  const hrs = Math.floor(mins / 60);
  if (hrs < 3) return { label: (hrs > 0 ? hrs + "h " : "") + (mins % 60) + "m left", cls: "warn" };
  return { label: hrs + "h left", cls: "" };
}
function coursesOf(c) {
  return (c.student?.courses || []).map(x => String(x).toLowerCase());
}
function batchesOf(c) {
  return c.student?.batches || [];
}
function isPaid(c) { return c.student?.verified === true; }

// Sab batches jama kar ke dropdown bharna
function refreshBatchOptions() {
  const set = new Set();
  convos.forEach(c => batchesOf(c).forEach(b => { if (b) set.add(b); }));
  const list = Array.from(set).sort();
  const el = $("batchFilter");
  if (!el) return;
  const cur = el.value;
  el.innerHTML = '<option value="">All batches</option>' +
    list.map(b => '<option value="' + esc(b) + '">' + esc(b) + '</option>').join("");
  if (list.includes(cur)) el.value = cur;
  else if (cur) { el.value = ""; batchFilter = ""; }
}

function displayNameOf(c) {
  return c.student?.name || c.displayName || ("+" + (c.waNumber || c.id));
}
// Chat jawab ka intezar kar rahi hai? (aakhri message student ka tha)
function isWaiting(c) { return (c.unread || 0) > 0 || c.awaitingReply === true; }

function updateTotalBadge() {
  const n = convos.filter(c => (c.unread || 0) > 0).length;
  const el = $("totalUnread");
  el.textContent = n;
  el.style.display = n > 0 ? "inline-block" : "none";
  document.title = n > 0 ? "(" + n + ") Support inbox" : "Support inbox — Umair TikTok Wala";
}

function filteredConvos() {
  return convos.filter(c => {
    if (searchTerm) {
      const hay = (displayNameOf(c) + " " + (c.waNumber || "")).toLowerCase();
      if (!hay.includes(searchTerm)) return false;
    }
    if (labelFilter && !(c.labels || []).includes(labelFilter)) return false;

    if (studentFilter === "paid" && !isPaid(c)) return false;
    if (studentFilter === "free" && isPaid(c)) return false;
    if (studentFilter === "facebook" && !coursesOf(c).includes("facebook")) return false;
    if (studentFilter === "tiktok" && !coursesOf(c).includes("tiktok")) return false;

    if (batchFilter && !batchesOf(c).includes(batchFilter)) return false;
    if (currentFilter === "unread") return (c.unread || 0) > 0;
    if (currentFilter === "mine") return c.assignedUid === me.uid;
    if (currentFilter === "unassigned") return !c.assignedUid;
    if (currentFilter === "waiting") return isWaiting(c) && minsSince(c.lastMessageAt) >= 5;
    return true;
  });
}

function renderList() {
  const list = $("convoList");
  const shown = filteredConvos();

  if (!shown.length) {
    list.innerHTML = '<div class="empty">' +
      (convos.length ? "Is filter mein koi chat nahi." : "Abhi koi chat nahi.<br>Jab koi message karega, yahan aa jayegi.") +
      '</div>';
    return;
  }

  list.innerHTML = shown.map(c => {
    const unread = (c.unread || 0) > 0;
    const tags = [];

    if (unread) tags.push('<span class="tag tag-unread">' + c.unread + '</span>');

    const viewer = presence[c.id];
    if (viewer) tags.push('<span class="tag tag-viewing">' + esc(viewer.name) + ' viewing</span>');

    if (isWaiting(c)) {
      const m = minsSince(c.lastMessageAt);
      if (m >= URGENT_MINUTES) tags.push('<span class="tag tag-wait urgent">' + m + 'm waiting</span>');
      else if (m >= 5) tags.push('<span class="tag tag-wait">' + m + 'm waiting</span>');
    }

    if (c.student?.verified) tags.push('<span class="tag tag-paid">Paid</span>');
    else if (!c.student) tags.push('<span class="tag tag-new">Not enrolled</span>');
    else tags.push('<span class="tag tag-free">Free</span>');

    coursesOf(c).forEach(co => {
      if (co === "facebook") tags.push('<span class="tag tag-fb">Facebook</span>');
      else if (co === "tiktok") tags.push('<span class="tag tag-tt">TikTok</span>');
      else tags.push('<span class="tag tag-agent">' + esc(co) + '</span>');
    });

    batchesOf(c).forEach(b => tags.push('<span class="tag tag-batch">' + esc(b) + '</span>'));

    const w = windowState(c);
    if (w.cls === "closed") tags.push('<span class="tag tag-expiring">Window closed</span>');

    (c.labels || []).forEach(id => {
      const l = labelById(id);
      if (l) tags.push('<span class="lab lab-' + l.color + '">' + esc(l.name) + '</span>');
    });

    if (c.surveyAnswer === "yes") tags.push('<span class="lab lab-green">Survey: Haan</span>');
    if (c.surveyAnswer === "no")  tags.push('<span class="lab lab-red">Survey: Nahi</span>');
    if (c.surveyPending || c.survey2Pending) tags.push('<span class="lab lab-grey">Survey sent</span>');
    if (c.behaviourRating === 3) tags.push('<span class="lab lab-green">&#9733; Bohot achha</span>');
    if (c.behaviourRating === 1) tags.push('<span class="lab lab-red">&#9733; Achha nahi</span>');

    if (c.assignedTo) {
      const mine = c.assignedUid === me.uid;
      tags.push('<span class="tag tag-agent">' + (mine ? "You" : esc(c.assignedTo)) + '</span>');
    }

    const cls = "convo" + (c.id === activeId ? " active" : "") + (unread ? " unread" : " read");
    return '<div class="' + cls + '" data-id="' + c.id + '">' +
      '<div class="convo-top"><span class="convo-name">' + esc(displayNameOf(c)) + '</span>' +
      '<span class="convo-time">' + timeAgo(c.lastMessageAt) + '</span></div>' +
      '<div class="convo-preview">' + esc(c.lastMessage || "") + '</div>' +
      (tags.length ? '<div class="convo-tags">' + tags.join("") + '</div>' : '') +
    '</div>';
  }).join("");

  list.querySelectorAll(".convo").forEach(el => {
    el.onclick = () => openConvo(el.dataset.id);
  });
}

setInterval(() => { if (convos.length) renderList(); }, 60000);

// ---------- Chat kholna ----------
async function openConvo(id) {
  if (pendingSend) flushPending();
  activeId = id;
  renderList();
  renderInfo();
  startPresenceLoop(id);

  const c = convos.find(x => x.id === id);
  if (!c) return;

  // Read mark + auto-assign agar khali hai
  const patch = {};
  if ((c.unread || 0) > 0) patch.unread = 0;
  if (!c.assignedUid) { patch.assignedUid = me.uid; patch.assignedTo = me.name; }
  patch.lastOpenedBy = me.name;
  patch.lastOpenedAt = serverTimestamp();
  try { await updateDoc(doc(db, "conversations", id), patch); } catch (e) {}

  $("chatArea").innerHTML =
    '<div class="chat-head" id="chatHead"></div>' +
    '<div class="viewing-bar" id="viewingBar" style="display:none"></div>' +
    '<div class="messages" id="messages"><div class="empty">Loading&hellip;</div></div>' +
    '<div class="composer" id="composer">' +
      '<div class="drop-hint" id="dropHint">File yahan chhoR dein</div>' +
      '<div class="slash" id="slash"></div>' +
      '<div class="undo-bar" id="undoBar">' +
        '<span>Message bheja ja raha hai&hellip; <span class="undo-count" id="undoCount">8</span></span>' +
        '<button id="undoBtn">Undo</button>' +
      '</div>' +
      '<div class="file-preview" id="filePreview"></div>' +
      '<div class="quick" id="quick"></div>' +
      '<div class="composer-row">' +
        '<button class="attach-btn" id="attachBtn" title="File bhejein">&#128206;</button>' +
        '<textarea id="draft" placeholder="Message likhein&hellip;  ( / se saved reply )" rows="1"></textarea>' +
        '<button class="send-btn" id="sendBtn">&uarr;</button>' +
      '</div>' +
      '<div class="send-err" id="sendErr"></div>' +
    '</div>';

  paintChatHead();
  paintViewingBar();
  renderQuickBar();
  wireComposer();
  watchMessages(id);
  watchNotes(id);
}

function paintChatHead() {
  const head = $("chatHead");
  const c = convos.find(x => x.id === activeId);
  if (!head || !c) return;
  const w = windowState(c);
  const assigned = c.assignedTo
    ? (c.assignedUid === me.uid ? "You" : esc(c.assignedTo))
    : "Unassigned";

  head.innerHTML =
    '<div>' +
      '<div class="chat-head-name">' + esc(displayNameOf(c)) + '</div>' +
      '<div class="chat-head-sub">+' + esc(c.waNumber || c.id) +
        (c.student ? ' &middot; ' + esc([c.student.verified ? "Paid" : "Registered"]
          .concat(c.student.batches || []).concat(c.student.courses || []).join(" · ")) : '') +
      '</div>' +
    '</div>' +
    '<div class="chat-actions">' +
      '<span class="window-pill ' + w.cls + '">' + (w.label || "24h window open") + '</span>' +
      '<span class="mini-btn" style="cursor:default">' + assigned + '</span>' +
      (c.assignedUid === me.uid
        ? '<button class="mini-btn" id="releaseBtn">Release</button>'
        : '<button class="mini-btn primary" id="takeBtn">Take this</button>') +
      '<span class="assign-wrap">' +
        '<button class="mini-btn" id="assignBtn">Assign &#9662;</button>' +
        '<div class="assign-menu" id="assignMenu"></div>' +
      '</span>' +
      '<button class="mini-btn" id="unreadBtn">Mark unread</button>' +
      '<button class="mini-btn" id="delChatBtn" style="color:var(--danger)">Delete chat</button>' +
      (c.surveyPending ? '<span class="mini-btn" style="cursor:default">Survey sent</span>'
                       : '<button class="mini-btn" id="surveyBtn">Send survey</button>') +
    '</div>';

  const take = $("takeBtn");
  if (take) take.onclick = async () => {
    try {
      await updateDoc(doc(db, "conversations", activeId),
        { assignedUid: me.uid, assignedTo: me.name });
    } catch (e) {}
  };
  const rel = $("releaseBtn");
  if (rel) rel.onclick = async () => {
    try {
      await updateDoc(doc(db, "conversations", activeId),
        { assignedUid: null, assignedTo: null });
    } catch (e) {}
  };
  // Assign dropdown
  const ab = $("assignBtn"), am = $("assignMenu");
  if (ab && am) {
    ab.onclick = (e) => {
      e.stopPropagation();
      am.innerHTML =
        '<div class="assign-item' + (!c.assignedUid ? " cur" : "") + '" data-uid="">' +
          '<span class="who-dot" style="background:var(--line)"></span>Unassigned</div>' +
        team.map(t =>
          '<div class="assign-item' + (c.assignedUid === t.uid ? " cur" : "") + '" data-uid="' + t.uid + '">' +
            '<span class="who-dot" style="background:' + colorFor(t.name) + '"></span>' +
            esc(t.name) + (t.uid === me.uid ? " (you)" : "") +
          '</div>'
        ).join("");
      am.classList.toggle("show");

      am.querySelectorAll("[data-uid]").forEach(el => {
        el.onclick = async (ev) => {
          ev.stopPropagation();
          const uid = el.dataset.uid;
          const t = team.find(x => x.uid === uid);
          try {
            await updateDoc(doc(db, "conversations", activeId), {
              assignedUid: uid || null,
              assignedTo: t ? t.name : null
            });
          } catch (e) {}
          am.classList.remove("show");
        };
      });
    };
  }

  // Delete poori chat
  const dc = $("delChatBtn");
  if (dc) dc.onclick = async () => {
    if (!confirm("Poori chat delete kar dein?\n\nSaare messages aur notes mit jayenge. Student ke phone se nahi hatega.")) return;
    dc.disabled = true;
    dc.textContent = "Delete ho rahi hai...";
    try {
      await deleteConversation(activeId);
      activeId = null;
      if (unsubMessages) { unsubMessages(); unsubMessages = null; }
      if (unsubNotes) { unsubNotes(); unsubNotes = null; }
      if (presenceTimer) { clearInterval(presenceTimer); presenceTimer = null; }
      clearMyPresence();
      $("chatArea").innerHTML = '<div class="placeholder">Pick a conversation to start</div>';
      renderInfo();
    } catch (e) {
      alert("Delete nahi hui: " + e.message);
      dc.disabled = false;
      dc.textContent = "Delete chat";
    }
  };

  const sv = $("surveyBtn");
  if (sv) sv.onclick = async () => {
    if (!confirm("Student ko survey bhejein? (masla hal hua ya nahi)")) return;
    sv.disabled = true;
    sv.textContent = "Bhej rahe hain...";
    try {
      const token = await getToken();
      const r = await fetch("/api/whatsapp-survey", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify({ to: c.waNumber || c.id })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Survey nahi gaya");
    } catch (e) {
      alert(e.message);
      sv.disabled = false;
      sv.textContent = "Send survey";
    }
  };

  const un = $("unreadBtn");
  if (un) un.onclick = async () => {
    try {
      await updateDoc(doc(db, "conversations", activeId), { unread: 1 });
      activeId = null;
      if (presenceTimer) { clearInterval(presenceTimer); presenceTimer = null; }
      clearMyPresence();
      $("chatArea").innerHTML = '<div class="placeholder">Pick a conversation to start</div>';
      renderInfo();
      renderList();
    } catch (e) {}
  };
}

async function watchMessages(id) {
  try { await getToken(); } catch (e) {}
  if (unsubMessages) unsubMessages();
  const mq = query(collection(db, "conversations", id, "messages"), orderBy("timestamp", "asc"), limit(100));
  unsubMessages = onSnapshot(mq, (snap) => {
    const box = $("messages");
    if (!box) return;
    const failed = Array.from(box.querySelectorAll(".bubble.failed"));
    if (snap.empty) { box.innerHTML = '<div class="empty">No messages</div>'; return; }

    box.innerHTML = snap.docs
      .filter(d => d.data().deleted !== true)
      .map(d => renderBubble(d.id, d.data())).join("");

    failed.forEach(el => box.appendChild(el));
    wireBubbles();
    box.scrollTop = box.scrollHeight;
  });
}

function renderBubble(msgId, m) {
  const t = m.timestamp?.toDate ? m.timestamp.toDate() : new Date();
  const stamp = t.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  let by = "";
  if (m.direction === "out") {
    if (m.sentBy === "welcome" || m.sentBy === "keyword") by = ' &middot; auto';
    else if (m.sentBy === "survey") by = ' &middot; survey';
    else if (m.sentBy) by = ' &middot; <span class="agent-chip" style="color:' +
      colorFor(m.sentBy) + '">' + esc(m.sentBy) + '</span>';
  }

  const metaLine = '<span class="meta">' + stamp + by + '</span>';
  const menu = '<button class="msg-menu" data-del="' + msgId + '" title="Delete">&times;</button>';
  const hasMedia = !!m.mediaId;
  const isMedia = hasMedia && ["image", "video", "audio", "sticker", "document"].includes(m.type);

  if (!isMedia) {
    return '<div class="bubble ' + m.direction + '">' + menu +
      esc(m.text || "") + metaLine + '</div>';
  }

  const src = mediaUrl(m.mediaId);
  let inner = "";

  if (m.type === "image" || m.type === "sticker") {
    inner = '<img data-full="' + src + '" src="' + src + '" alt="Image" ' +
      'onerror="this.outerHTML=\'<div class=&quot;media-fail&quot;>Image nahi mili &mdash; 30 din se purani ho sakti hai</div>\'">';
  } else if (m.type === "video") {
    inner = '<video controls preload="metadata" src="' + src + '"></video>';
  } else if (m.type === "audio") {
    inner = '<div class="aud"><span style="font-size:17px">&#127908;</span>' +
      '<audio controls preload="none" src="' + src + '"></audio></div>';
  } else if (m.type === "document") {
    const nm = m.filename || "Document";
    inner = '<a class="doc-row" href="' + src + '&download=1&name=' + encodeURIComponent(nm) + '" target="_blank" rel="noopener">' +
      '<span class="doc-icon">&#128196;</span>' +
      '<span><span class="doc-name">' + esc(nm) + '</span><br>' +
      '<span class="doc-sub">Download</span></span></a>';
  }

  const cap = m.text ? '<div class="cap">' + esc(m.text) + '</div>' : "";
  return '<div class="bubble media ' + m.direction + '">' + menu + inner + cap + metaLine + '</div>';
}

function mediaUrl(id) {
  return "/api/whatsapp-media?id=" + encodeURIComponent(id) +
         "&token=" + encodeURIComponent(cachedToken || "");
}

function wireBubbles() {
  const box = $("messages");
  if (!box) return;

  box.querySelectorAll("[data-del]").forEach(b => {
    b.onclick = async (e) => {
      e.stopPropagation();
      if (!confirm("Ye message dashboard se hata dein?\n\nStudent ke phone se nahi hatega.")) return;
      try {
        await updateDoc(doc(db, "conversations", activeId, "messages", b.dataset.del),
          { deleted: true, deletedBy: me.name, deletedAt: serverTimestamp() });
      } catch (e) { alert("Delete nahi hua"); }
    };
  });

  box.querySelectorAll("img[data-full]").forEach(img => {
    img.onclick = () => openLightbox('<img src="' + img.dataset.full + '">');
  });
}

// ---------- Poori chat delete ----------
async function deleteConversation(id) {
  // messages
  const msgs = await getDocs(collection(db, "conversations", id, "messages"));
  for (let i = 0; i < msgs.docs.length; i += 400) {
    const batch = writeBatch(db);
    msgs.docs.slice(i, i + 400).forEach(d => batch.delete(d.ref));
    await batch.commit();
  }
  // notes
  const nts = await getDocs(collection(db, "conversations", id, "notes"));
  if (nts.docs.length) {
    const batch = writeBatch(db);
    nts.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
  }
  await deleteDoc(doc(db, "conversations", id));
}

// Har team member ka apna rang (naam se hi bana lete hain)
function colorFor(name) {
  const palette = ["#2563eb","#7c3aed","#0f766e","#b45309","#be185d","#4338ca","#15803d"];
  let h = 0;
  for (let i = 0; i < String(name).length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return palette[h % palette.length];
}

// ---------- Composer: quick bar + slash commands ----------
function renderQuickBar() {
  const bar = $("quick");
  if (!bar) return;
  const top = savedReplies.slice(0, 5);
  bar.innerHTML =
    top.map((r, i) => '<button data-sr="' + r.id + '">/' + esc(r.cmd) + '</button>').join("") +
    '<button class="manage" id="manageSr">Manage replies</button>';

  bar.querySelectorAll("[data-sr]").forEach(b => {
    b.onclick = () => {
      const r = savedReplies.find(x => x.id === b.dataset.sr);
      if (!r) return;
      const ta = $("draft");
      ta.value = r.text;
      ta.focus();
      autoGrow(ta);
    };
  });
  $("manageSr").onclick = openSrModal;
}

function autoGrow(ta) {
  ta.style.height = "auto";
  ta.style.height = Math.min(ta.scrollHeight, 130) + "px";
}

function wireComposer() {
  const ta = $("draft");
  ta.oninput = () => { autoGrow(ta); updateSlash(); };
  ta.onkeydown = (e) => {
    const slashBox = $("slash");
    const open = slashBox && slashBox.classList.contains("show");

    if (open) {
      if (e.key === "ArrowDown") { e.preventDefault(); slashSel = Math.min(slashSel + 1, slashMatches.length - 1); paintSlash(); return; }
      if (e.key === "ArrowUp")   { e.preventDefault(); slashSel = Math.max(slashSel - 1, 0); paintSlash(); return; }
      if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); applySlash(slashSel); return; }
      if (e.key === "Escape")    { hideSlash(); return; }
    }
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  };
  $("sendBtn").onclick = send;

  // File attach
  $("attachBtn").onclick = () => $("fileInput").click();
  $("fileInput").onchange = (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) stageFile(f);
    e.target.value = "";
  };

  // Drag & drop
  const comp = $("composer"), hint = $("dropHint");
  ["dragenter", "dragover"].forEach(ev =>
    comp.addEventListener(ev, e => { e.preventDefault(); hint.classList.add("show"); })
  );
  ["dragleave", "drop"].forEach(ev =>
    comp.addEventListener(ev, e => {
      e.preventDefault();
      if (ev === "dragleave" && comp.contains(e.relatedTarget)) return;
      hint.classList.remove("show");
    })
  );
  comp.addEventListener("drop", e => {
    const f = e.dataTransfer?.files?.[0];
    if (f) stageFile(f);
  });

  // Paste se image
  ta.addEventListener("paste", (e) => {
    const items = e.clipboardData?.items || [];
    for (const it of items) {
      if (it.kind === "file") {
        const f = it.getAsFile();
        if (f) { e.preventDefault(); stageFile(f); return; }
      }
    }
  });
}

// ---------- File staging ----------
let stagedFile = null;

function stageFile(f) {
  const MAX = 16 * 1024 * 1024;
  if (f.size > MAX) {
    $("sendErr").textContent = "File bohot bari hai (16 MB tak)";
    return;
  }
  stagedFile = f;
  const box = $("filePreview");
  const kb = f.size < 1024 * 1024
    ? Math.round(f.size / 1024) + " KB"
    : (f.size / 1024 / 1024).toFixed(1) + " MB";

  const thumb = f.type.startsWith("image/")
    ? '<img id="fpThumb" alt="">'
    : '<span style="font-size:22px">' +
      (f.type.startsWith("video/") ? "&#127909;" : f.type.startsWith("audio/") ? "&#127925;" : "&#128196;") +
      '</span>';

  box.innerHTML = thumb +
    '<span class="fp-name">' + esc(f.name) + '<br><span class="fp-size">' + kb + '</span></span>' +
    '<button class="tiny-btn" id="fpCancel">Remove</button>';
  box.classList.add("show");

  if (f.type.startsWith("image/")) {
    const r = new FileReader();
    r.onload = () => { const t = $("fpThumb"); if (t) t.src = r.result; };
    r.readAsDataURL(f);
  }

  $("fpCancel").onclick = clearStagedFile;
  $("draft").placeholder = "Caption likhein (optional)&hellip;";
  $("draft").focus();
}

function clearStagedFile() {
  stagedFile = null;
  const box = $("filePreview");
  if (box) { box.classList.remove("show"); box.innerHTML = ""; }
  const ta = $("draft");
  if (ta) ta.placeholder = "Message likhein\u2026  ( / se saved reply )";
}

function updateSlash() {
  const ta = $("draft");
  const v = ta.value;
  if (!v.startsWith("/")) { hideSlash(); return; }
  const term = v.slice(1).toLowerCase().trim();
  slashMatches = savedReplies.filter(r => r.cmd.toLowerCase().startsWith(term));
  if (!slashMatches.length) { hideSlash(); return; }
  slashSel = 0;
  paintSlash();
}
function paintSlash() {
  const box = $("slash");
  if (!box) return;
  box.innerHTML = slashMatches.map((r, i) =>
    '<div class="slash-item' + (i === slashSel ? " sel" : "") + '" data-i="' + i + '">' +
      '<div class="slash-cmd">/' + esc(r.cmd) + '</div>' +
      '<div class="slash-body">' + esc(r.text.replace(/\n/g, " ")) + '</div>' +
    '</div>'
  ).join("");
  box.classList.add("show");
  box.querySelectorAll(".slash-item").forEach(el => {
    el.onclick = () => applySlash(Number(el.dataset.i));
  });
}
function hideSlash() {
  const box = $("slash");
  if (box) { box.classList.remove("show"); box.innerHTML = ""; }
  slashMatches = [];
}
function applySlash(i) {
  const r = slashMatches[i];
  if (!r) return;
  const ta = $("draft");
  ta.value = r.text;
  hideSlash();
  ta.focus();
  autoGrow(ta);
}

// ---------- Sending ----------
let cachedToken = null, cachedTokenAt = 0;
async function getToken() {
  const now = Date.now();
  if (cachedToken && now - cachedTokenAt < 50 * 60 * 1000) return cachedToken;
  cachedToken = await auth.currentUser.getIdToken();
  cachedTokenAt = now;
  return cachedToken;
}

const UNDO_SECONDS = 8;

function send() {
  const c = convos.find(x => x.id === activeId);
  const ta = $("draft"), err = $("sendErr");
  if (!c) return;

  const text = ta.value.trim();
  if (!text && !stagedFile) return;

  // Agar pehla message abhi undo window mein hai to usay foran bhej dein
  if (pendingSend) flushPending();

  const payload = {
    to: c.waNumber || c.id,
    convoId: c.id,
    text,
    file: stagedFile,
  };

  ta.value = "";
  autoGrow(ta);
  hideSlash();
  err.textContent = "";
  clearStagedFile();

  const bubble = addPendingBubble(
    payload.file ? (payload.file.name + (text ? "\n" + text : "")) : text
  );

  // Undo bar chalayen
  let left = UNDO_SECONDS;
  $("undoCount").textContent = left;
  $("undoBar").classList.add("show");

  const tick = setInterval(() => {
    left--;
    const el = $("undoCount");
    if (el) el.textContent = left;
    if (left <= 0) flushPending();
  }, 1000);

  pendingSend = { payload, bubble, tick };

  $("undoBtn").onclick = () => {
    if (!pendingSend) return;
    clearInterval(pendingSend.tick);
    if (pendingSend.bubble) pendingSend.bubble.remove();
    // Wapas composer mein daal dein taake edit kar sakein
    const ta2 = $("draft");
    if (ta2 && pendingSend.payload.text) {
      ta2.value = pendingSend.payload.text;
      autoGrow(ta2);
      ta2.focus();
    }
    if (pendingSend.payload.file) stageFile(pendingSend.payload.file);
    pendingSend = null;
    $("undoBar").classList.remove("show");
  };
}

function flushPending() {
  if (!pendingSend) return;
  const { payload, bubble, tick } = pendingSend;
  clearInterval(tick);
  pendingSend = null;
  const bar = $("undoBar");
  if (bar) bar.classList.remove("show");
  doSend(payload, bubble);
}

async function doSend(payload, bubble) {
  const { to, convoId, text, file } = payload;
  try {
    const token = await getToken();

    if (file) {
      const dataUrl = await fileToDataUrl(file);
      const r = await fetch("/api/whatsapp-send-media", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify({ to, dataUrl, filename: file.name, caption: text })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "File nahi gayi");
    } else {
      const r = await fetch("/api/whatsapp-send", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify({ to, text })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Message nahi gaya");
    }

    if (bubble) bubble.remove();
  } catch (e) {
    if (String(e.message).toLowerCase().includes("session")) cachedToken = null;
    if (bubble) {
      bubble.classList.add("failed");
      const meta = bubble.querySelector(".meta");
      if (meta) meta.textContent = "Nahi gaya — " + e.message;
    }
    if (activeId === convoId) {
      const err = $("sendErr");
      if (err) err.textContent = e.message;
    }
  }
}

function fileToDataUrl(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("File parhi nahi ja saki"));
    r.readAsDataURL(f);
  });
}

function addPendingBubble(text) {
  const box = $("messages");
  if (!box) return null;
  const el = document.createElement("div");
  el.className = "bubble out pending";
  const t = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  el.innerHTML = esc(text) + '<span class="meta">' + t + ' &middot; bhej rahe hain&hellip;</span>';
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  return el;
}

// ---------- Info panel ----------
function renderInfo() {
  const c = convos.find(x => x.id === activeId);
  const panel = $("infoPanel");
  if (!c) {
    panel.innerHTML = '<div class="info-title">Student</div><div class="empty" style="padding:20px 0">No chat selected</div>';
    return;
  }
  const s = c.student;
  const name = displayNameOf(c);
  const initials = name.replace(/[^A-Za-z ]/g, "").trim().split(/\s+/)
    .slice(0, 2).map(w => w[0] || "").join("").toUpperCase() || "?";

  let rows = "";
  if (s) {
    rows += infoRow("Status", s.verified ? "Paid &middot; verified" : "Registered", true);
    if (s.email) rows += infoRow("Email", s.email);
    if (s.batches?.length) rows += infoRow("Batch", s.batches.map(chip).join(""), true);
    if (s.courses?.length) rows += infoRow("Courses", s.courses.map(chip).join(""), true);
  } else {
    rows += infoRow("Status", "Not in student records");
  }
  if (c.assignedTo) rows += infoRow("Assigned to", c.assignedUid === me.uid ? "You" : c.assignedTo);
  if (c.lastOpenedBy) rows += infoRow("Last opened by", c.lastOpenedBy);
  rows += infoRow("First message", c.createdAt ? fmtDate(c.createdAt) : "&mdash;", true);

  const active = c.labels || [];
  const labelPicker =
    '<div class="info-title" style="margin-top:20px">Labels</div>' +
    '<div class="label-row">' +
      LABELS.map(l =>
        '<span class="lab lab-' + l.color + ' lab-pick' + (active.includes(l.id) ? ' on' : '') +
        '" data-label="' + l.id + '">' + esc(l.name) + '</span>'
      ).join("") +
    '</div>';

  const notesBox =
    '<div class="info-title" style="margin-top:22px">Internal notes</div>' +
    '<div class="note-box">' +
      '<div id="noteList"></div>' +
      '<textarea class="note-input" id="noteInput" placeholder="Team ke liye note (student ko nazar nahi aata)"></textarea>' +
      '<button class="mini-btn" id="noteAdd" style="margin-top:7px;width:100%">Add note</button>' +
    '</div>';

  panel.innerHTML =
    '<div class="info-title">Student</div>' +
    '<div class="avatar">' + esc(initials) + '</div>' +
    '<div class="info-name">' + esc(name) + '</div>' +
    '<div class="info-number">+' + esc(c.waNumber || c.id) + '</div>' +
    '<div style="margin-top:14px">' + rows + '</div>' +
    labelPicker + notesBox;

  panel.querySelectorAll("[data-label]").forEach(el => {
    el.onclick = async () => {
      const id = el.dataset.label;
      const cur = (convos.find(x => x.id === activeId)?.labels) || [];
      const next = cur.includes(id) ? cur.filter(x => x !== id) : cur.concat([id]);
      try { await updateDoc(doc(db, "conversations", activeId), { labels: next }); } catch (e) {}
    };
  });

  renderNotes();
  const add = $("noteAdd");
  if (add) add.onclick = async () => {
    const ta = $("noteInput");
    const txt = ta.value.trim();
    if (!txt) return;
    ta.value = "";
    try {
      await addDoc(collection(db, "conversations", activeId, "notes"), {
        text: txt, by: me.name, at: serverTimestamp()
      });
    } catch (e) { alert("Note save nahi hua"); }
  };
}

function watchNotes(id) {
  if (unsubNotes) unsubNotes();
  notes = [];
  unsubNotes = onSnapshot(
    query(collection(db, "conversations", id, "notes"), orderBy("at", "desc"), limit(30)),
    (snap) => { notes = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderNotes(); }
  );
}

function renderNotes() {
  const box = $("noteList");
  if (!box) return;
  if (!notes.length) { box.innerHTML = ""; return; }
  box.innerHTML = notes.map(n => {
    const t = n.at?.toDate ? n.at.toDate() : null;
    const when = t ? t.toLocaleDateString([], { day: "numeric", month: "short" }) + " " +
      t.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";
    return '<div class="note">' + esc(n.text) +
      '<div class="note-meta"><span>' + esc(n.by || "") + ' &middot; ' + when + '</span>' +
      '<button class="note-del" data-note="' + n.id + '">delete</button></div></div>';
  }).join("");
  box.querySelectorAll("[data-note]").forEach(b => {
    b.onclick = async () => {
      try { await deleteDoc(doc(db, "conversations", activeId, "notes", b.dataset.note)); } catch (e) {}
    };
  });
}

function infoRow(label, value, raw) {
  return '<div class="info-row"><div class="info-label">' + esc(label) + '</div>' +
    '<div class="info-value">' + (raw ? value : esc(value)) + '</div></div>';
}
function chip(t) { return '<span class="chip">' + esc(t) + '</span>'; }
function fmtDate(ts) {
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString([], { day: "numeric", month: "short", year: "numeric" });
}

// ---------- Stats ----------
$("statsBtn").onclick = openStats;
$("statsClose").onclick = () => $("statsModal").classList.remove("show");

async function openStats() {
  if (me.role !== "owner") return;
  $("statsModal").classList.add("show");
  const box = $("statsBody");
  box.innerHTML = '<div class="empty">Hisab lagaya ja raha hai&hellip;</div>';

  const now = Date.now();
  const DAY = 24 * 60 * 60 * 1000;
  const weekAgo = now - 7 * DAY;

  // ---- Chats ka hisab ----
  let openChats = 0, unreadChats = 0, unassigned = 0, waiting = 0, newToday = 0;
  let surveyYes = 0, surveyNo = 0, surveyPending = 0;
  const labelCount = {};
  const agentStats = {};   // naam -> { replies, yes, no, ratings[] }

  const bump = (name) => {
    if (!agentStats[name]) agentStats[name] = { replies: 0, yes: 0, no: 0, ratings: [] };
    return agentStats[name];
  };

  convos.forEach(c => {
    if (c.status !== "resolved") openChats++;
    if ((c.unread || 0) > 0) unreadChats++;
    if (!c.assignedUid) unassigned++;
    if (isWaiting(c) && minsSince(c.lastMessageAt) >= URGENT_MINUTES) waiting++;
    const created = c.createdAt?.toMillis ? c.createdAt.toMillis() : 0;
    if (created > now - DAY) newToday++;

    if (c.surveyAnswer === "yes") surveyYes++;
    if (c.surveyAnswer === "no") surveyNo++;
    if (c.surveyPending || c.survey2Pending) surveyPending++;

    // Survey ka credit us member ko jis ne handle kiya
    const who = c.surveyAgent || c.assignedTo;
    if (who && c.surveyAnswer) {
      const a = bump(who);
      if (c.surveyAnswer === "yes") a.yes++; else a.no++;
    }
    const bWho = c.behaviourAgent || c.surveyAgent || c.assignedTo;
    if (bWho && c.behaviourRating) bump(bWho).ratings.push(c.behaviourRating);

    (c.labels || []).forEach(id => { labelCount[id] = (labelCount[id] || 0) + 1; });
  });

  // ---- Replies ginna + rozana ka graph ----
  let autoReplies = 0;
  const perDay = {};
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now - i * DAY);
    perDay[d.toDateString()] = 0;
  }

  const recent = convos.filter(c => {
    const t = c.lastMessageAt?.toMillis ? c.lastMessageAt.toMillis() : 0;
    return t > weekAgo;
  }).slice(0, 25);

  for (const c of recent) {
    try {
      const snap = await getDocs(
        query(collection(db, "conversations", c.id, "messages"), orderBy("timestamp", "desc"), limit(60))
      );
      snap.forEach(d => {
        const m = d.data();
        if (m.direction !== "out" || m.deleted === true) return;
        const t = m.timestamp?.toMillis ? m.timestamp.toMillis() : 0;
        if (t < weekAgo) return;
        const by = m.sentBy || "";
        if (["welcome", "keyword", "survey", "system"].includes(by)) { autoReplies++; return; }
        if (!by) return;
        bump(by).replies++;
        const key = new Date(t).toDateString();
        if (key in perDay) perDay[key]++;
      });
    } catch (e) {}
  }

  // ---- Sorting ----
  const agents = Object.entries(agentStats)
    .filter(([, a]) => a.replies || a.yes || a.no || a.ratings.length)
    .sort((a, b) => b[1].replies - a[1].replies);
  const maxRep = agents.length ? Math.max(...agents.map(a => a[1].replies), 1) : 1;

  const days = Object.entries(perDay);
  const maxDay = Math.max(...days.map(d => d[1]), 1);

  const labelRows = Object.entries(labelCount).sort((a, b) => b[1] - a[1]);
  const maxLabel = labelRows.length ? labelRows[0][1] : 1;

  const totalSurvey = surveyYes + surveyNo;
  const satisfaction = totalSurvey ? Math.round((surveyYes / totalSurvey) * 100) : null;

  const allRatings = agents.flatMap(([, a]) => a.ratings);
  const avgBehaviour = allRatings.length
    ? (allRatings.reduce((x, y) => x + y, 0) / allRatings.length) : null;

  const ratingText = (v) => v >= 2.5 ? "Bohot achha" : v >= 1.7 ? "Theek" : "Behtar karna hai";
  const ratingColor = (v) => v >= 2.5 ? "#15803d" : v >= 1.7 ? "#b45309" : "#b91c1c";

  // ---- Render ----
  box.innerHTML =
    '<div class="stats-grid">' +
      statCard(convos.length, "Total chats") +
      statCard(openChats, "Open") +
      statCard(unreadChats, "Unread") +
      statCard(unassigned, "Unassigned") +
      statCard(waiting, URGENT_MINUTES + "m+ waiting") +
      statCard(newToday, "New (24h)") +
    '</div>' +

    // Rozana ka graph
    '<div class="info-title" style="margin-top:22px">Rozana replies &mdash; 7 din</div>' +
    '<div class="graph">' +
      days.map(([d, n]) => {
        const h = Math.round((n / maxDay) * 88) + 3;
        const lbl = new Date(d).toLocaleDateString([], { weekday: "short" });
        return '<div class="graph-col">' +
          '<span class="graph-val">' + n + '</span>' +
          '<div class="graph-bar" style="height:' + h + 'px"></div>' +
          '<span class="graph-lbl">' + lbl + '</span></div>';
      }).join("") +
    '</div>' +

    // Team performance
    '<div class="info-title" style="margin-top:24px">Team performance &mdash; 7 din</div>' +
    (agents.length
      ? '<table class="stat-table"><thead><tr>' +
          '<th>Member</th><th>Replies</th><th>Hal huay</th><th>Behaviour</th>' +
        '</tr></thead><tbody>' +
        agents.map(([name, a]) => {
          const solved = a.yes + a.no;
          const rate = solved ? Math.round((a.yes / solved) * 100) : null;
          const avg = a.ratings.length
            ? (a.ratings.reduce((x, y) => x + y, 0) / a.ratings.length) : null;
          return '<tr>' +
            '<td><span style="color:' + colorFor(name) + ';font-weight:600">' + esc(name) + '</span></td>' +
            '<td>' + a.replies +
              '<div class="rate-bar"><div class="rate-fill" style="width:' +
              Math.round((a.replies / maxRep) * 100) + '%;background:' + colorFor(name) + '"></div></div></td>' +
            '<td>' + (rate === null ? '<span style="color:var(--faint)">&mdash;</span>'
              : '<b>' + rate + '%</b><br><span style="font-size:11px;color:var(--faint)">' +
                a.yes + " / " + solved + '</span>') + '</td>' +
            '<td>' + (avg === null ? '<span style="color:var(--faint)">&mdash;</span>'
              : '<b style="color:' + ratingColor(avg) + '">' + avg.toFixed(1) + '</b>' +
                '<br><span style="font-size:11px;color:var(--faint)">' + ratingText(avg) +
                ' (' + a.ratings.length + ')</span>') + '</td>' +
          '</tr>';
        }).join("") +
        '<tr><td style="color:var(--faint)">Auto replies</td><td>' + autoReplies +
        '</td><td></td><td></td></tr>' +
        '</tbody></table>'
      : '<div class="empty" style="padding:14px 0">Abhi koi reply nahi.</div>') +

    // Survey
    '<div class="info-title" style="margin-top:24px">Survey</div>' +
    (totalSurvey || surveyPending
      ? '<div class="stats-grid">' +
          statCard('<span class="survey-yes">' + surveyYes + '</span>', "Masla hal hua") +
          statCard('<span class="survey-no">' + surveyNo + '</span>', "Hal nahi hua") +
          statCard(surveyPending, "Jawab ka intezar") +
          statCard(satisfaction === null ? "&mdash;" : satisfaction + "%", "Resolution rate") +
          statCard(avgBehaviour === null ? "&mdash;"
            : '<span style="color:' + ratingColor(avgBehaviour) + '">' + avgBehaviour.toFixed(1) + '</span>',
            "Behaviour (3 max)") +
        '</div>'
      : '<div class="empty" style="padding:14px 0">Abhi koi survey nahi bheja gaya.</div>') +

    // Labels
    '<div class="info-title" style="margin-top:24px">Labels</div>' +
    (labelRows.length
      ? '<table class="stat-table"><tbody>' +
        labelRows.map(([id, n]) => {
          const l = labelById(id);
          return '<tr><td><span class="lab lab-' + (l ? l.color : "grey") + '">' +
            esc(l ? l.name : id) + '</span></td><td>' + n + '</td>' +
            '<td style="width:38%"><span class="bar" style="width:' +
            Math.round((n / maxLabel) * 100) + '%"></span></td></tr>';
        }).join("") + '</tbody></table>'
      : '<div class="empty" style="padding:14px 0">Abhi koi label nahi laga.</div>') +

    '<div class="hint" style="margin-top:20px">' +
    'Behaviour rating: 3 = bohot achha, 2 = theek, 1 = achha nahi.<br>' +
    'Chats 7 din baad khud delete ho jati hain, is liye hisab bhi 7 din ka hai.</div>';
}

function statCard(num, label) {
  return '<div class="stat-card"><div class="stat-num">' + num + '</div>' +
         '<div class="stat-lbl">' + esc(label) + '</div></div>';
}
</script>
